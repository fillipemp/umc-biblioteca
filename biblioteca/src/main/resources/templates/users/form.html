<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Operador', content=~{::main})}">
<main th:with="currentPage='users'">

    <div class="page-header">
        <h1 class="page-title" th:text="${isNew} ? 'Novo Operador' : 'Editar Operador'">Operador</h1>
        <a th:href="@{/users}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <div class="card-body">

            <!-- Mensagem de erro de campo -->
            <div th:if="${fieldError}" class="alert alert-error" th:text="${fieldError}"></div>

            <form th:action="${action}" method="post" th:object="${user}" autocomplete="off">

                <div class="form-grid">

                    <!-- Nome -->
                    <div class="form-group">
                        <label class="form-label" for="name">Nome *</label>
                        <input id="name" type="text" th:field="*{name}" class="form-control"
                               placeholder="Nome completo" required/>
                    </div>

                    <!-- E-mail -->
                    <div class="form-group">
                        <label class="form-label" for="email">E-mail *</label>
                        <input id="email" type="email" th:field="*{email}" class="form-control"
                               placeholder="usuario@dominio.com" required/>
                    </div>

                    <!-- Perfil -->
                    <div class="form-group">
                        <label class="form-label" for="role">Perfil *</label>
                        <select id="role" th:field="*{role}" class="form-control">
                            <option value="ADMIN">Administrador</option>
                            <option value="USER">Operador</option>
                        </select>
                    </div>

                </div>

                <!-- Separador de senha -->
                <div style="margin:1.5rem 0 1rem; border-top:1px solid var(--border-color); padding-top:1rem">
                    <p th:if="${!isNew}" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem">
                        Deixe em branco para manter a senha atual.
                    </p>

                    <div class="form-grid">

                        <!-- Senha -->
                        <div class="form-group">
                            <label class="form-label" for="password">
                                <th:block th:if="${isNew}">Senha *</th:block>
                                <th:block th:unless="${isNew}">Nova Senha</th:block>
                            </label>
                            <div style="position:relative">
                                <input id="password" name="password" type="password"
                                       class="form-control" placeholder="Mínimo 6 caracteres"
                                       th:required="${isNew}" autocomplete="new-password"
                                       style="padding-right:2.8rem"/>
                                <button type="button" onclick="togglePass('password','eyePass')"
                                        style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);
                                               background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0"
                                        tabindex="-1">
                                    <svg id="eyePass" width="18" height="18" fill="none" stroke="currentColor"
                                         stroke-width="2" viewBox="0 0 24 24">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Confirmar Senha -->
                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">
                                <th:block th:if="${isNew}">Confirmar Senha *</th:block>
                                <th:block th:unless="${isNew}">Confirmar Nova Senha</th:block>
                            </label>
                            <div style="position:relative">
                                <input id="confirmPassword" name="confirmPassword" type="password"
                                       class="form-control" placeholder="Repita a senha"
                                       th:required="${isNew}" autocomplete="new-password"
                                       style="padding-right:2.8rem"/>
                                <button type="button" onclick="togglePass('confirmPassword','eyeConfirm')"
                                        style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);
                                               background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0"
                                        tabindex="-1">
                                    <svg id="eyeConfirm" width="18" height="18" fill="none" stroke="currentColor"
                                         stroke-width="2" viewBox="0 0 24 24">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <small id="matchMsg" style="display:none;color:#e74c3c;font-size:0.8rem;margin-top:4px">
                                As senhas não coincidem.
                            </small>
                        </div>

                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btnSalvar">Salvar</button>
                    <a th:href="@{/users}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    /* ── Mostrar/ocultar senha ── */
    function togglePass(inputId, iconId) {
        var inp  = document.getElementById(inputId);
        var icon = document.getElementById(iconId);
        if (inp.type === 'password') {
            inp.type = 'text';
            /* ícone "olho riscado" */
            icon.innerHTML =
                '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>' +
                '<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>' +
                '<line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            inp.type = 'password';
            icon.innerHTML =
                '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>' +
                '<circle cx="12" cy="12" r="3"/>';
        }
    }

    /* ── Validação de confirmação em tempo real ── */
    var pass    = document.getElementById('password');
    var confirm = document.getElementById('confirmPassword');
    var msg     = document.getElementById('matchMsg');
    var btn     = document.getElementById('btnSalvar');

    function checkMatch() {
        if (confirm.value === '') { msg.style.display = 'none'; return; }
        if (pass.value !== confirm.value) {
            msg.style.display = 'block';
            confirm.style.borderColor = '#e74c3c';
        } else {
            msg.style.display = 'none';
            confirm.style.borderColor = '';
        }
    }

    pass.addEventListener('input', checkMatch);
    confirm.addEventListener('input', checkMatch);

    /* Bloqueia submit se senhas não coincidem */
    document.querySelector('form').addEventListener('submit', function(e) {
        if (confirm.value !== '' && pass.value !== confirm.value) {
            e.preventDefault();
            msg.style.display = 'block';
            confirm.focus();
        }
    });
    </script>

</main>
</html>
