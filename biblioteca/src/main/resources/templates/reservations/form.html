<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Nova Reserva', content=~{::main})}">
<main th:with="currentPage='reservations'">

    <div class="page-header">
        <h1 class="page-title">Nova Reserva</h1>
        <a th:href="@{/reservations}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/reservations}" method="post">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="bookId">Livro *</label>
                        <select id="bookId" name="bookId" class="form-control" required>
                            <option value="">Selecione um livro…</option>
                            <option th:each="book : ${books}"
                                    th:value="${book.id}"
                                    th:text="${book.title + ' (' + book.availableQuantity + ' disponível)'}"
                                    th:disabled="${book.availableQuantity == 0}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="readerId">Leitor *</label>
                        <select id="readerId" name="readerId" class="form-control" required>
                            <option value="">Selecione um leitor…</option>
                            <option th:each="reader : ${readers}"
                                    th:value="${reader.id}"
                                    th:text="${reader.name + ' — ' + reader.email}">
                            </option>
                        </select>
                    </div>
                </div>

                <p style="font-size:0.8rem;color:var(--text-muted);margin-top:1rem">
                    A reserva expira em 3 dias. O estoque só é reduzido ao gerar o empréstimo.
                </p>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Criar Reserva</button>
                    <a th:href="@{/reservations}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</main>
</html>
